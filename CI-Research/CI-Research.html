<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Intelligence | Competitive Research</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1b2d4f; --navy-light: #243d6a; --gold: #b8922a; --gold-light: #d4ab4e;
      --cream: #faf8f4; --white: #ffffff; --gray-50: #f8f7f5; --gray-100: #eeece8;
      --gray-300: #c8c4bb; --gray-500: #8a8580; --gray-700: #4a4742; --gray-900: #1e1c1a;
      --red: #b53c3c; --green: #2e7d4f;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--navy); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.25); }
    .logo { display: flex; align-items: center; gap: .65rem; }
    .logo-mark { width: 30px; height: 30px; background: var(--gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 700; font-size: .95rem; color: var(--navy); flex-shrink: 0; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 600; color: var(--white); letter-spacing: .03em; }
    .logo-text span { color: var(--gold-light); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .header-tag { font-size: .68rem; text-transform: uppercase; letter-spacing: .12em; color: var(--gray-300); font-weight: 500; }

    /* API Key bar */
    #api-bar { background: #111d30; border-bottom: 1px solid rgba(255,255,255,.07); padding: .5rem 2rem; display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; }
    #api-bar label { font-size: .72rem; color: var(--gray-300); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
    #api-key-input { flex: 1; min-width: 180px; max-width: 400px; padding: .38rem .7rem; font-size: .8rem; font-family: 'Inter', sans-serif; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 5px; color: var(--white); outline: none; }
    #api-key-input::placeholder { color: rgba(255,255,255,.3); }
    #api-key-input:focus { border-color: var(--gold); }
    #save-key-btn { padding: .38rem .85rem; background: var(--gold); border: none; border-radius: 5px; color: var(--white); font-size: .72rem; font-weight: 600; cursor: pointer; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; }
    #save-key-btn:hover { background: var(--gold-light); }
    .key-status { font-size: .72rem; color: #6fcf97; white-space: nowrap; }
    .key-status.missing { color: #eb5757; }
    #clear-key-btn { font-size: .7rem; color: var(--gray-300); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
    #clear-key-btn:hover { color: var(--white); }

    /* Hero */
    .hero { background: linear-gradient(160deg, var(--navy) 0%, var(--navy-light) 100%); padding: 3.5rem 2rem 2.5rem; text-align: center; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; font-weight: 700; color: var(--white); margin-bottom: .5rem; }
    .hero p { font-size: .9rem; color: var(--gray-300); margin-bottom: 2rem; font-weight: 300; }
    .search-box { max-width: 660px; margin: 0 auto; display: flex; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.35); }
    #company-input { flex: 1; padding: .95rem 1.3rem; font-size: 1rem; font-family: 'Inter', sans-serif; border: none; outline: none; background: var(--white); color: var(--gray-900); }
    #company-input::placeholder { color: var(--gray-300); }
    #generate-btn { padding: .95rem 1.8rem; background: var(--gold); color: var(--white); border: none; cursor: pointer; font-size: .9rem; font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; transition: background .2s; }
    #generate-btn:hover:not(:disabled) { background: var(--gold-light); }
    #generate-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

    /* Main */
    main { flex: 1; padding: 1.8rem 2rem 4rem; max-width: 1050px; margin: 0 auto; width: 100%; }

    /* Error */
    #error-section { display: none; background: #fdf2f2; border: 1px solid #f5c6c6; border-radius: 8px; padding: 1rem 1.3rem; margin-bottom: 1.2rem; color: var(--red); font-size: .88rem; }
    #error-section.visible { display: block; }

    /* Progress */
    #progress-section { display: none; background: var(--white); border: 1px solid var(--gray-100); border-radius: 8px; padding: 1.1rem 1.4rem; margin-bottom: 1.4rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    #progress-section.visible { display: block; }
    .progress-header { display: flex; align-items: center; gap: .55rem; margin-bottom: .7rem; }
    .spinner { width: 13px; height: 13px; border: 2px solid var(--gray-100); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--gray-500); }
    #progress-log { display: flex; flex-direction: column; gap: .3rem; max-height: 160px; overflow-y: auto; }
    .progress-item { font-size: .8rem; color: var(--gray-700); padding: .28rem .55rem; background: var(--gray-50); border-radius: 4px; border-left: 2px solid var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-3px); } to { opacity:1; transform: none; } }

    /* Report */
    #report-section { display: none; background: var(--white); border: 1px solid var(--gray-100); border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    #report-section.visible { display: block; }
    .report-toolbar { display: flex; align-items: center; justify-content: space-between; padding: .9rem 1.4rem; border-bottom: 1px solid var(--gray-100); background: var(--gray-50); flex-wrap: wrap; gap: .5rem; }
    .report-title { font-family: 'Playfair Display', serif; font-size: .95rem; font-weight: 600; color: var(--navy); }
    .report-meta { font-size: .73rem; color: var(--gray-500); margin-top: .1rem; }
    .toolbar-actions { display: flex; gap: .5rem; }
    .btn-outline { padding: .4rem .9rem; font-size: .73rem; font-weight: 600; font-family: 'Inter', sans-serif; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border-radius: 5px; border: 1px solid var(--gray-300); background: var(--white); color: var(--gray-700); transition: all .15s; }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
    .btn-primary-sm { padding: .4rem .9rem; font-size: .73rem; font-weight: 600; font-family: 'Inter', sans-serif; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border-radius: 5px; border: none; background: var(--navy); color: var(--white); transition: all .15s; }
    .btn-primary-sm:hover { background: var(--navy-light); }

    /* Report content */
    #report-output { padding: 2.2rem 2.8rem; line-height: 1.75; color: var(--gray-900); font-size: .92rem; }
    #report-output h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--navy); margin-bottom: .4rem; padding-bottom: .7rem; border-bottom: 2px solid var(--gold); }
    #report-output h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--navy); margin: 2rem 0 .65rem; padding-left: .85rem; border-left: 3px solid var(--gold); text-transform: uppercase; letter-spacing: .04em; }
    #report-output h3 { font-size: .9rem; font-weight: 600; color: var(--gray-700); margin: 1.2rem 0 .35rem; text-transform: uppercase; letter-spacing: .05em; }
    #report-output p { margin-bottom: .8rem; color: var(--gray-700); }
    #report-output ul, #report-output ol { margin: .4rem 0 .9rem 1.4rem; }
    #report-output li { margin-bottom: .35rem; color: var(--gray-700); }
    #report-output strong { color: var(--gray-900); font-weight: 600; }
    #report-output hr { border: none; border-top: 1px solid var(--gray-100); margin: 1.8rem 0; }
    #report-output a { color: var(--gold); text-decoration: none; }
    #report-output a:hover { text-decoration: underline; }
    #report-output blockquote { border-left: 3px solid var(--gold); padding: .45rem .9rem; margin: .9rem 0; color: var(--gray-500); background: var(--gray-50); border-radius: 0 4px 4px 0; }
    #report-output table { width: 100%; border-collapse: collapse; margin: .9rem 0; font-size: .85rem; }
    #report-output th { background: var(--navy); color: var(--white); padding: .55rem .9rem; text-align: left; font-weight: 500; }
    #report-output td { padding: .5rem .9rem; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
    #report-output tr:nth-child(even) td { background: var(--gray-50); }

    .streaming-cursor::after { content: '▌'; color: var(--gold); animation: blink .9s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    @media print {
      header, #api-bar, .hero, #progress-section, .report-toolbar { display: none !important; }
      #report-section { border: none; box-shadow: none; }
      #report-output { padding: 0; }
      body { background: white; }
    }
    @media (max-width: 600px) {
      .hero { padding: 2rem 1rem 1.8rem; }
      .hero h1 { font-size: 1.55rem; }
      .search-box { flex-direction: column; }
      .search-box input, .search-box button { width: 100%; }
      main { padding: 1rem .8rem 3rem; }
      #report-output { padding: 1.4rem 1rem; }
      .header-tag { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">Meridian <span>Intelligence</span></div>
  </div>
  <div class="header-tag">Competitive Research Platform</div>
</header>

<div id="api-bar">
  <label for="api-key-input">Anthropic API Key</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
  <button id="save-key-btn" onclick="saveKey()">Save Key</button>
  <span id="key-status" class="key-status missing">No key saved</span>
  <button id="clear-key-btn" onclick="clearKey()" style="display:none">Clear</button>
</div>

<div class="hero">
  <h1>Company Intelligence Brief</h1>
  <p>Litigation counsel · M&A counsel · Recent transactions · News · BD intelligence</p>
  <div class="search-box">
    <input type="text" id="company-input" placeholder="Enter company name (e.g. Tesla, Inc.)" autocomplete="off" />
    <button id="generate-btn" onclick="generateReport()">Generate Report</button>
  </div>
</div>

<main>
  <div id="error-section"><strong>Error:</strong> <span id="error-msg"></span></div>

  <div id="progress-section">
    <div class="progress-header">
      <div class="spinner" id="spinner"></div>
      <div class="progress-label">Researching — please wait (1–3 min)</div>
    </div>
    <div id="progress-log"></div>
  </div>

  <div id="report-section">
    <div class="report-toolbar">
      <div>
        <div class="report-title" id="report-title">Intelligence Brief</div>
        <div class="report-meta" id="report-meta"></div>
      </div>
      <div class="toolbar-actions">
        <button class="btn-outline" onclick="copyReport()">Copy</button>
        <button class="btn-primary-sm" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>
    <div id="report-output" class="streaming-cursor"></div>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `You are a senior research analyst at an elite law firm. You compile competitive intelligence reports for partners preparing for business development meetings or evaluating potential client relationships.

Your reports must be:
- Specific: real firm names, partner names, case captions, deal values, and dates whenever available
- Current: focus on the past 12–24 months
- Actionable: highlight what matters for a law firm partner's BD strategy
- Comprehensive: cover every requested section before concluding

When identifying legal counsel, always specify: law firm name, lead partner(s) if identifiable, and the specific matter(s) they handled. Generic references to "outside counsel" without names are not useful.`;

function makePrompt(company) {
  return `Research and compile a competitive intelligence report on **${company}** for a senior law firm partner. Search the web for current information and structure your report as follows:

## 1. Company Overview
- Full legal name, HQ, ticker (if public), key executives (CEO, GC, CFO), revenue/scale

## 2. Recent News & Strategic Developments
Past 12–18 months: major announcements, leadership changes, regulatory activity, strategic initiatives.

## 3. Litigation & Regulatory Matters
Active and recent legal proceedings. For each: case caption, court/agency, date filed, dispute type, status, exposure if known.

## 4. Outside Litigation Counsel
Law firms and lead partners representing ${company} in litigation. Which firm handles which dispute type.

## 5. M&A & Major Transactions
Past 2–3 years. For each deal: counterparty, type, date, value, rationale.

## 6. Transactional Counsel
Law firms and lead partners advising ${company} on deals. Which firm on which deal.

## 7. Business Development Intelligence
- Key legal decision-maker (GC name, title, background)
- Upcoming legal needs based on business trajectory
- Counsel relationship gaps
- Recommended pitch angle for a new firm

Be specific with names, dates, and figures. Search thoroughly before writing each section.`;
}

// ── API Key management ──
function el(id) { return document.getElementById(id); }

function loadKey() {
  const key = localStorage.getItem('anthropic_api_key') || '';
  if (key) {
    el('api-key-input').value = key;
    el('key-status').textContent = 'Key saved ✓';
    el('key-status').className = 'key-status';
    el('clear-key-btn').style.display = 'inline';
  }
}

function saveKey() {
  const key = el('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('anthropic_api_key', key);
  el('key-status').textContent = 'Key saved ✓';
  el('key-status').className = 'key-status';
  el('clear-key-btn').style.display = 'inline';
  el('api-key-input').blur();
}

function clearKey() {
  localStorage.removeItem('anthropic_api_key');
  el('api-key-input').value = '';
  el('key-status').textContent = 'No key saved';
  el('key-status').className = 'key-status missing';
  el('clear-key-btn').style.display = 'none';
}

// ── Report generation ──
let fullText = '';
let renderTimer = null;
let startTime = null;

marked.setOptions({ breaks: true, gfm: true });

async function generateReport() {
  const company = el('company-input').value.trim();
  if (!company) { el('company-input').focus(); return; }

  const apiKey = localStorage.getItem('anthropic_api_key') || el('api-key-input').value.trim();
  if (!apiKey) {
    showError('Please enter and save your Anthropic API key above.');
    return;
  }

  fullText = '';
  startTime = Date.now();
  el('progress-log').innerHTML = '';
  el('report-output').innerHTML = '';
  el('report-output').classList.add('streaming-cursor');
  el('error-section').classList.remove('visible');
  el('progress-section').classList.add('visible');
  el('report-section').classList.add('visible');
  el('spinner').style.display = 'block';
  el('generate-btn').disabled = true;
  el('generate-btn').textContent = 'Researching…';
  el('report-title').textContent = `Intelligence Brief: ${company}`;
  el('report-meta').textContent = `Generated ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
  el('progress-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    await streamReport(company, apiKey);
  } catch (err) {
    showError(err.message || String(err));
  }
}

async function streamReport(company, apiKey) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 6000,
      stream: true,
      system: SYSTEM_PROMPT,
      tools: [
        { type: 'web_search_20260209', name: 'web_search' },
        { type: 'web_fetch_20260209', name: 'web_fetch' },
      ],
      messages: [{ role: 'user', content: makePrompt(company) }],
    }),
  });

  if (!response.ok) {
    let msg = `API error ${response.status}`;
    try {
      const err = await response.json();
      msg = err.error?.message || msg;
      if (response.status === 401) msg = 'Invalid API key. Please check and re-enter your key.';
      if (response.status === 429) msg = 'Rate limit hit. Wait 60 seconds and try again.';
    } catch(e) {}
    throw new Error(msg);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let inServerTool = false;
  let toolName = '';
  let toolInput = '';
  let done = false;

  while (!done) {
    const { done: streamDone, value } = await reader.read();
    if (streamDone) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw || raw === '[DONE]') continue;

      let evt;
      try { evt = JSON.parse(raw); } catch(e) { continue; }

      const t = evt.type;

      if (t === 'content_block_start') {
        const block = evt.content_block || {};
        if (block.type === 'server_tool_use') {
          inServerTool = true;
          toolName = block.name || '';
          toolInput = '';
        }
      } else if (t === 'content_block_delta') {
        const delta = evt.delta || {};
        if (delta.type === 'text_delta') {
          fullText += delta.text;
          scheduleRender();
        } else if (delta.type === 'input_json_delta' && inServerTool) {
          toolInput += delta.partial_json || '';
        }
      } else if (t === 'content_block_stop') {
        if (inServerTool) {
          let msg = '';
          try {
            const parsed = JSON.parse(toolInput);
            if (toolName === 'web_search') msg = `Searching: ${parsed.query || '...'}`;
            else if (toolName === 'web_fetch') {
              const u = parsed.url || '...';
              msg = `Reading: ${u.length > 85 ? u.slice(0, 85) + '…' : u}`;
            }
          } catch(e) { msg = toolName ? `Running ${toolName}…` : 'Searching…'; }
          if (msg) addProgress(msg);
          inServerTool = false; toolName = ''; toolInput = '';
        }
      } else if (t === 'message_stop') {
        done = true;
      } else if (t === 'error') {
        throw new Error(evt.error?.message || 'API stream error');
      }
    }
  }

  finalizeReport();
}

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    el('report-output').innerHTML = marked.parse(fullText);
  }, 80);
}

function addProgress(text) {
  const log = el('progress-log');
  const item = document.createElement('div');
  item.className = 'progress-item';
  item.textContent = text;
  log.appendChild(item);
  log.scrollTop = log.scrollHeight;
}

function finalizeReport() {
  clearTimeout(renderTimer);
  el('report-output').innerHTML = marked.parse(fullText);
  el('report-output').classList.remove('streaming-cursor');
  el('spinner').style.display = 'none';
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  addProgress(`✓ Report complete in ${elapsed}s`);
  el('generate-btn').disabled = false;
  el('generate-btn').textContent = 'Generate Report';
  el('report-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  el('error-msg').textContent = msg;
  el('error-section').classList.add('visible');
  el('progress-section').classList.remove('visible');
  el('generate-btn').disabled = false;
  el('generate-btn').textContent = 'Generate Report';
}

function copyReport() {
  navigator.clipboard.writeText(fullText || el('report-output').innerText).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

el('company-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !el('generate-btn').disabled) generateReport();
});
el('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

loadKey();
</script>
</body>
</html>
