<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEC EDGAR Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #eef2f7; color: #1a1a2e; min-height: 100vh; }

    header { background: #1e2d5a; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }
    .sec-badge { background: #e63946; color: white; font-weight: 800; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; letter-spacing: 0.05em; flex-shrink: 0; }

    main { max-width: 920px; margin: 0 auto; padding: 24px 16px; }

    .search-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .search-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; color: #666; margin-bottom: 12px; text-transform: uppercase; }
    .search-row { display: flex; gap: 8px; }
    .search-input { flex: 1; border: 2px solid #dde3f0; border-radius: 8px; padding: 12px 16px; font-size: 1rem; outline: none; -webkit-appearance: none; color: #1a1a2e; }
    .search-input:focus { border-color: #1e2d5a; }
    .search-btn { background: #1e2d5a; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .search-btn:active { opacity: 0.85; }

    .chips { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .chips-label { font-size: 0.75rem; color: #888; }
    .chip { background: none; border: 1px solid #ccd; border-radius: 20px; padding: 5px 13px; font-size: 0.8rem; color: #444; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .chip:hover { border-color: #1e2d5a; color: #1e2d5a; }

    .info-bar { background: #f0f4ff; border: 1px solid #d0d8f8; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #3a3a6e; margin-bottom: 16px; line-height: 1.6; }
    .info-bar b { color: #1e2d5a; }
    .info-sep { color: #aaa; margin: 0 8px; }

    .results-count { font-size: 0.85rem; color: #555; margin-bottom: 14px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr)); gap: 14px; }

    .card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); display: flex; flex-direction: column; gap: 6px; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-co { font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
    .badge { background: #e67e22; color: white; font-size: 0.68rem; font-weight: 700; padding: 3px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .card-meta { font-size: 0.8rem; color: #777; }
    .card-desc { font-size: 0.82rem; color: #555; line-height: 1.4; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .cik { font-size: 0.75rem; color: #aaa; }
    .btn-view { background: #1e2d5a; color: white; border-radius: 6px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600; text-decoration: none; -webkit-tap-highlight-color: transparent; display: inline-block; }
    .btn-view:hover { background: #16214a; }

    .load-more { display: block; width: 100%; margin-top: 20px; padding: 12px; background: white; border: 2px solid #1e2d5a; border-radius: 8px; color: #1e2d5a; font-size: 0.95rem; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .load-more:hover { background: #f0f4ff; }
    .load-more:disabled { opacity: 0.6; cursor: default; }

    .placeholder { text-align: center; color: #aaa; padding: 60px 20px; font-size: 0.95rem; }

    .spinner { border: 3px solid #e8ecf4; border-top: 3px solid #1e2d5a; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: #fff5f5; border: 1px solid #fca5a5; border-radius: 10px; padding: 24px; text-align: center; }
    .error-box h3 { color: #c0392b; margin-bottom: 10px; font-size: 1rem; }
    .error-box p { font-size: 0.875rem; color: #555; line-height: 1.7; }
    .try-link { display: inline-block; margin-top: 16px; background: #c0392b; color: white; padding: 10px 22px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    .try-link:hover { background: #a93226; }

    @media (max-width: 500px) {
      header { padding: 12px 16px; }
      .search-card { padding: 16px; }
      .search-btn { padding: 12px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>SEC EDGAR Search</h1>
    <p>Search public filings in plain English</p>
  </div>
  <span class="sec-badge">SEC</span>
</header>

<main>
  <div class="search-card">
    <div class="search-label">What are you looking for?</div>
    <div class="search-row">
      <input id="q" class="search-input" type="search"
             placeholder='e.g. "Apple earnings 2023" or "Tesla 8-K"'
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div class="chips">
      <span class="chips-label">Try:</span>
      <span class="chip" onclick="setQ(this)">Apple earnings 2023</span>
      <span class="chip" onclick="setQ(this)">Tesla 8-K 2024</span>
      <span class="chip" onclick="setQ(this)">merger proxies last 6 months</span>
      <span class="chip" onclick="setQ(this)">Microsoft annual report 2023</span>
      <span class="chip" onclick="setQ(this)">pharma acquisitions Q1 2024</span>
    </div>
  </div>
  <div id="results"><p class="placeholder">Enter a search above to find SEC filings.</p></div>
</main>

<script>
  // ── UPDATE THIS after deploying to Railway ──────────────────────────────────
  var RAILWAY_PROXY = 'https://claude-code-production-2694.up.railway.app';
  // ── Update this URL if you redeploy to a different Railway project ───────────

  var EDGAR_DIRECT = 'https://efts.sec.gov/LATEST/search-index';
  var FALLBACK     = 'https://efts.sec.gov/LATEST/search-index';
  var EDGAR_WEB    = 'https://www.sec.gov/cgi-bin/srqsb';

  // ── Natural-language parser ─────────────────────────────────────────────────
  var FORM_MAP = [
    [/\b(annual\s+report|10-?k|10k)\b/i,                       ['10-K']],
    [/\b(quarterly\s+report|10-?q|10q)\b/i,                    ['10-Q']],
    [/\b(earnings|financials?)\b/i,                             ['10-K','10-Q']],
    [/\b(8-?k|8k|current\s+report|press\s+release)\b/i,        ['8-K']],
    [/\b(proxy|proxies|def\s?14a|annual\s+meeting)\b/i,        ['DEF 14A']],
    [/\b(ipo|s-?1\b|registration\s+statement)\b/i,             ['S-1']],
    [/\b(merger|acquisition|acqui|takeover|buyout)\b/i,        ['8-K','SC TO-T']],
  ];
  var FORM_WORDS = /\b(annual\s+report|quarterly\s+report|earnings|financials?|press\s+release|current\s+report|proxy|proxies|annual\s+meeting|ipo|registration\s+statement|merger|acquisition|takeover|buyout)\b/gi;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function lastDay(yr, mo) { return new Date(parseInt(yr), parseInt(mo), 0).getDate(); }

  function parse(raw) {
    var text = raw.trim();
    var forms = [], startdt = '', enddt = '';

    var qm   = text.match(/\bQ([1-4])\s*(20\d{2})\b/i);
    var ym   = !qm && text.match(/\b(20\d{2})\b/);
    var relm = text.match(/last\s+(\d+)\s+(month|year|week)s?/i);

    if (qm) {
      var q = parseInt(qm[1]), yr = qm[2];
      var ms = {1:[1,3],2:[4,6],3:[7,9],4:[10,12]}[q];
      startdt = yr + '-' + pad(ms[0]) + '-01';
      enddt   = yr + '-' + pad(ms[1]) + '-' + lastDay(yr, ms[1]);
      text = text.replace(qm[0], '');
    } else if (ym) {
      startdt = ym[1] + '-01-01';
      enddt   = ym[1] + '-12-31';
      text = text.replace(ym[1], '');
    } else if (relm) {
      var n = parseInt(relm[1]), unit = relm[2].toLowerCase();
      var d = new Date();
      if (unit === 'year')       d.setFullYear(d.getFullYear() - n);
      else if (unit === 'month') d.setMonth(d.getMonth() - n);
      else if (unit === 'week')  d.setDate(d.getDate() - n * 7);
      startdt = d.toISOString().slice(0, 10);
      enddt   = new Date().toISOString().slice(0, 10);
      text = text.replace(relm[0], '');
    }

    var seen = {};
    FORM_MAP.forEach(function(pair) {
      if (pair[0].test(raw)) {
        pair[1].forEach(function(f) { if (!seen[f]) { seen[f] = 1; forms.push(f); } });
      }
    });
    text = text.replace(FORM_WORDS, ' ');

    var terms = text.replace(/[^\w\s&.'-]/g, ' ').trim()
                    .split(/\s+/).filter(function(t) { return t.length > 1; });
    return { terms: terms, forms: forms, startdt: startdt, enddt: enddt };
  }

  // ── Query string builder ────────────────────────────────────────────────────
  function buildQS(f, from) {
    var p = new URLSearchParams({
      q:    f.terms.join(' '),
      from: String(from),
      size: '40',
      'hits.hits.total.value': 'true'
    });
    if (f.forms.length) p.set('forms', f.forms.join(','));
    if (f.startdt || f.enddt) {
      p.set('dateRange', 'custom');
      if (f.startdt) p.set('startdt', f.startdt);
      if (f.enddt)   p.set('enddt',   f.enddt);
    }
    return p.toString();
  }

  // ── Fetch: Railway proxy → local node proxy → direct EDGAR ─────────────────
  async function fetchEdgar(qs) {
    // 1. Railway proxy (set RAILWAY_PROXY after deploying to Railway)
    if (RAILWAY_PROXY) {
      var r = await fetch(RAILWAY_PROXY.replace(/\/$/, '') + '/search?' + qs);
      if (r.ok) return await r.json();
      throw new Error('Proxy returned HTTP ' + r.status);
    }
    // 2. Local node proxy at /edgar-search (works when served via node server.js)
    try {
      var r2 = await fetch('/edgar-search?' + qs);
      if (r2.ok) return await r2.json();
    } catch(e) {}
    // 3. Direct EDGAR (works on desktop browsers that allow cross-origin)
    try {
      var r3 = await fetch(EDGAR_DIRECT + '?' + qs, { mode: 'cors' });
      if (r3.ok) return await r3.json();
    } catch(e) {}
    var err = new Error('CORS');
    err.isCors = true;
    throw err;
  }

  // ── Render helpers ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toRow(h) {
    var s    = h._source || h;
    var cik  = (s.ciks && s.ciks[0]) || '';
    var name = ((s.display_names && s.display_names[0]) || 'Unknown').split('(CIK')[0].trim();
    var form = s.form || s.root_form || '';
    var date = s.file_date || '';
    var adsh = s.adsh || '';
    var desc = s.file_description || (Array.isArray(s.items) ? s.items.join(', ') : (s.items || ''));
    var link = (cik && adsh)
      ? 'https://www.sec.gov/Archives/edgar/data/' + cik + '/' + adsh.replace(/-/g,'') + '/' + adsh + '-index.htm'
      : EDGAR_WEB;
    return '<div class="card">'
      + '<div class="card-header">'
      + '<div class="card-co">' + esc(name) + '</div>'
      + '<span class="badge">' + esc(form) + '</span>'
      + '</div>'
      + '<div class="card-meta">' + esc(date) + '</div>'
      + (desc ? '<div class="card-desc">' + esc(desc) + '</div>' : '')
      + '<div class="card-footer">'
      + '<span class="cik">CIK ' + esc(cik) + '</span>'
      + '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="btn-view">View &#8599;</a>'
      + '</div></div>';
  }

  function infoBar(f) {
    var parts = [];
    if (f.forms.length)  parts.push('<b>Types:</b> ' + esc(f.forms.join(', ')));
    if (f.startdt)       parts.push('<b>From:</b> '  + esc(f.startdt));
    if (f.enddt)         parts.push('<b>To:</b> '    + esc(f.enddt));
    if (f.terms.length)  parts.push('<b>Search:</b> '+ esc(f.terms.join(' ')));
    if (!parts.length)   return '';
    return '<div class="info-bar">Searching for: ' + parts.join('<span class="info-sep"> | </span>') + '</div>';
  }

  function corsError(q) {
    var enc = encodeURIComponent(q || '');
    return '<div class="error-box">'
      + '<h3>Unable to connect to SEC EDGAR</h3>'
      + '<p>Your browser is blocking the request (CORS restriction — common on mobile or when opening the file directly).<br><br>'
      + '<strong>Fix:</strong> Set the <code>RAILWAY_PROXY</code> variable at the top of the script to your Railway URL, '
      + 'or search directly on the SEC website:</p>'
      + '<a class="try-link" href="' + EDGAR_WEB + '?text=' + enc + '&first=1&last=40" target="_blank" rel="noopener">Open SEC EDGAR &#8599;</a>'
      + '</div>';
  }

  // ── State ───────────────────────────────────────────────────────────────────
  var currentParsed = null;
  var currentFrom   = 0;
  var totalHits     = 0;

  function setQ(el) {
    document.getElementById('q').value = el.textContent;
    doSearch();
  }

  function doSearch() {
    var q = document.getElementById('q').value.trim();
    if (!q) return;
    currentParsed = parse(q);
    currentFrom   = 0;
    totalHits     = 0;
    var qs  = buildQS(currentParsed, 0);
    var out = document.getElementById('results');
    out.innerHTML = infoBar(currentParsed) + '<div class="spinner"></div>';
    fetchEdgar(qs).then(function(data) {
      totalHits   = (data.hits && data.hits.total && data.hits.total.value) || 0;
      var hits    = (data.hits && data.hits.hits) || [];
      currentFrom = hits.length;
      out.innerHTML = infoBar(currentParsed)
        + '<div class="results-count">Showing ' + currentFrom + ' of ~' + totalHits.toLocaleString() + ' results</div>'
        + '<div class="grid" id="grid">' + hits.map(toRow).join('') + '</div>'
        + (currentFrom < totalHits ? '<button class="load-more" onclick="loadMore()">Load more results</button>' : '');
    }).catch(function(err) {
      if (err.isCors) {
        out.innerHTML = corsError(q);
      } else {
        out.innerHTML = '<div class="error-box"><h3>Error</h3><p>' + esc(err.message) + '</p></div>';
      }
    });
  }

  function loadMore() {
    if (!currentParsed) return;
    var qs  = buildQS(currentParsed, currentFrom);
    var btn = document.querySelector('.load-more');
    if (btn) { btn.textContent = 'Loading\u2026'; btn.disabled = true; }
    fetchEdgar(qs).then(function(data) {
      var hits    = (data.hits && data.hits.hits) || [];
      currentFrom += hits.length;
      var grid = document.getElementById('grid');
      if (grid) grid.insertAdjacentHTML('beforeend', hits.map(toRow).join(''));
      var b = document.querySelector('.load-more');
      if (b) {
        if (currentFrom >= totalHits) { b.remove(); }
        else { b.textContent = 'Load more results'; b.disabled = false; }
      }
    }).catch(function() {
      var b = document.querySelector('.load-more');
      if (b) { b.textContent = 'Error \u2014 try again'; b.disabled = false; }
    });
  }

  document.getElementById('q').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
