<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Tone Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      padding: 2rem;
    }
    header {
      max-width: 800px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header a {
      color: #6666aa;
      text-decoration: none;
      font-size: 0.9rem;
    }
    header a:hover { color: #a78bfa; }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .container { max-width: 800px; margin: 0 auto; }

    .api-key-section {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .api-key-section label { font-size: 0.85rem; color: #8888aa; white-space: nowrap; }
    .api-key-section input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: #e0e0f0;
      font-size: 0.9rem;
    }
    .api-key-section input:focus { outline: none; border-color: #6366f1; }

    .input-section {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .input-section label {
      display: block;
      font-size: 0.85rem;
      color: #8888aa;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    textarea {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 1rem;
      color: #e0e0f0;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 180px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #6366f1; }
    textarea::placeholder { color: #444466; }

    button.analyze-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 10px;
      padding: 0.9rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    button.analyze-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    button.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .results {
      display: none;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .results.visible { display: block; }

    .tone-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6666aa;
      margin-bottom: 0.6rem;
      margin-top: 1.25rem;
    }
    .section-title:first-child { margin-top: 0; }

    .indicators {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .indicator {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      color: #a0a0cc;
    }

    .suggestions-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .suggestions-list li {
      background: #12122a;
      border-left: 3px solid #6366f1;
      border-radius: 0 8px 8px 0;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      color: #c0c0e0;
      line-height: 1.5;
    }

    .summary-text {
      font-size: 0.95rem;
      color: #c0c0e0;
      line-height: 1.6;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #6666aa;
    }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #2a2a4a;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2a1020;
      border: 1px solid #6b2040;
      border-radius: 10px;
      padding: 1rem;
      color: #f08090;
      font-size: 0.9rem;
    }

    /* Tone color presets */
    .tone-professional  { background: #1a3a2a; color: #5dbb8a; }
    .tone-friendly      { background: #1a2a3a; color: #60a5fa; }
    .tone-casual        { background: #2a2a1a; color: #facc15; }
    .tone-passive-aggressive { background: #3a1a1a; color: #f87171; }
    .tone-aggressive    { background: #3a1010; color: #ff5555; }
    .tone-cold          { background: #1a2030; color: #94a3b8; }
    .tone-warm          { background: #2a1a0a; color: #fb923c; }
    .tone-default       { background: #1a1a3a; color: #a78bfa; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Back</a>
    <h1>📧 Email Tone Checker</h1>
  </header>

  <div class="container">
    <div class="api-key-section">
      <label for="apiKey">Anthropic API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
    </div>

    <div class="input-section">
      <label for="emailInput">Paste your email here</label>
      <textarea id="emailInput" placeholder="Hi John,

Just following up on my earlier message. I sent it three days ago and haven't heard back, which is fine I guess. If you're too busy to respond that's totally okay. I just thought this was important but maybe it's not.

Thanks,
Me"></textarea>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeEmail()">Analyze Tone</button>
    </div>

    <div class="results" id="results"></div>
  </div>

  <script>
    // Restore saved API key
    const savedKey = localStorage.getItem('anthropic_api_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;

    document.getElementById('apiKey').addEventListener('change', (e) => {
      localStorage.setItem('anthropic_api_key', e.target.value);
    });

    function getToneClass(tone) {
      const t = tone.toLowerCase();
      if (t.includes('passive-aggressive') || t.includes('passive aggressive')) return 'tone-passive-aggressive';
      if (t.includes('aggressive') || t.includes('hostile') || t.includes('angry')) return 'tone-aggressive';
      if (t.includes('professional') || t.includes('formal')) return 'tone-professional';
      if (t.includes('friendly') || t.includes('warm') || t.includes('enthusiastic')) return 'tone-warm';
      if (t.includes('casual') || t.includes('informal')) return 'tone-casual';
      if (t.includes('cold') || t.includes('distant') || t.includes('curt')) return 'tone-cold';
      if (t.includes('friendly')) return 'tone-friendly';
      return 'tone-default';
    }

    async function analyzeEmail() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const emailText = document.getElementById('emailInput').value.trim();
      const resultsDiv = document.getElementById('results');
      const btn = document.getElementById('analyzeBtn');

      if (!apiKey) { alert('Please enter your Anthropic API key.'); return; }
      if (!emailText) { alert('Please paste an email to analyze.'); return; }

      localStorage.setItem('anthropic_api_key', apiKey);

      btn.disabled = true;
      resultsDiv.className = 'results visible';
      resultsDiv.innerHTML = `<div class="loading"><div class="spinner"></div><br/>Reading between the lines...</div>`;

      const systemPrompt = `You are an expert email tone analyzer. Analyze the tone of emails with insight, specificity, and a touch of humor. Be honest and direct — if an email sounds passive-aggressive, say so clearly.

Respond with JSON in exactly this format:
{
  "overall_tone": "single label like Professional, Passive-Aggressive, Warm, Cold, Casual, Aggressive, Friendly, Nervous, etc.",
  "tone_summary": "2-3 sentences describing the tone and what it communicates between the lines",
  "indicators": ["specific phrase or pattern that signals the tone", "another indicator", ...],
  "suggestions": ["concrete suggestion to improve or adjust the tone", "another suggestion", ...]
}

indicators: 3-5 specific quoted phrases or behavioral patterns from the email that reveal its tone.
suggestions: 2-4 actionable suggestions. If the tone is already great, say so and give minor polish tips.`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 1024,
            system: systemPrompt,
            messages: [{ role: 'user', content: `Analyze this email:\n\n${emailText}` }]
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const raw = data.content[0].text;
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('Unexpected response format');
        const result = JSON.parse(jsonMatch[0]);

        const toneClass = getToneClass(result.overall_tone);
        const indicatorsHTML = result.indicators.map(i => `<span class="indicator">"${i}"</span>`).join('');
        const suggestionsHTML = result.suggestions.map(s => `<li>${s}</li>`).join('');

        resultsDiv.innerHTML = `
          <div class="section-title">Overall Tone</div>
          <span class="tone-badge ${toneClass}">${result.overall_tone}</span>

          <div class="section-title">What's Going On</div>
          <p class="summary-text">${result.tone_summary}</p>

          <div class="section-title">Dead Giveaways</div>
          <div class="indicators">${indicatorsHTML}</div>

          <div class="section-title">Suggestions</div>
          <ul class="suggestions-list">${suggestionsHTML}</ul>
        `;
      } catch (err) {
        resultsDiv.innerHTML = `<div class="error-box">⚠️ ${err.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('emailInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyzeEmail();
    });
  </script>
</body>
</html>
